app = "tempo-render-server"
primary_region = "iad"

[build]

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[services.http_checks]]
  interval = 30000
  grace_period = "10s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = 5000
